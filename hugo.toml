baseURL = "https://boluwajioadepojuworkp.github.io/"
languageCode = "en"
title = "Boluwaji Adepoju"
pagination.pagerSize = 5
enableGitInfo = true
enableRobotsTXT = true
theme = "hugo-texify2"

[module]
  [module.hugoVersion]
    min = "0.113.0"

[markup]
  defaultMarkdownHandler = "goldmark"
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    style = "tango"

[[menu.main]]
identifier = "post"
name = "Posts"
url = "/"
weight = 1
[[menu.main]]
identifier = "archives"
name = "Archive"
url = "/post/"
weight = 2
[[menu.main]]
identifier = "about"
name = "About"
url = "/about/"
weight = 3

[taxonomies]
tags = "tags"

[author]
name = "Boluwaji Oluwaseyi Adepoju"
email = "boluwajio.adepojuworkp@gmail.com"

[params]
title = "Boluwaji Adepoju"
description = "CS Student at Università degli Studi di Perugia. Notes on learning, knowledge systems, and thinking."
images = ['images/logo.jpg']
footnote = """
<a class=link href=https://github.com/boluwajioadepojuworkp target=_blank rel=noopener>GitHub</a> |
<a class=link href=https://boluwajioadepojuworkp.github.io/study-notes/ target=_blank rel=noopener>Study Notes</a> |
<a class=link href=/index.xml>RSS</a>
"""
keywords = ["learning", "knowledge", "notes", "computer science", "study"]
customCSS = []
customJS = []
dateFormat = "January 2, 2006"
emphasisWithDots = true
since = "2025"
toc = true
showWordCount = true
showReadingTime = true
rootFontSize = "120%"
math = true
numberedSubtitles = false

[params.sharingbuttons]
